name: Prow Lite

on:
  issue_comment:
    types:
      - created
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

env:
  PROW_GITHUB_PRIVATE_KEY: ${{ secrets.PROW_GITHUB_PRIVATE_KEY }}

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  run:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version:
          - "1.25.5"
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install dependencies
        run: |
          go mod tidy

      - name: Convert GitHub event to single-line JSON
        env:
          EVENT: ${{ toJson(github.event) }}
        run: |
          echo "EVENT=$(jq -n --arg event "$EVENT" '$event | @json')" >> $GITHUB_ENV

      - name: Run Prow Lite
        run: |
          go run cmd/prow/main.go run --mode ci --plugin event --event-type "${{ github.event_name }}" --event "$EVENT"
